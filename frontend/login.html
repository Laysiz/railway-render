<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🚂 Вход в систему</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">🚂</div>
                <h1 class="login-title">Управление поездами</h1>
                <p class="login-subtitle">Войдите в систему</p>
            </div>
            
            <div class="login-form">
                <div class="form-group">
                    <label for="login">Логин</label>
                    <input type="text" id="login" placeholder="Введите логин" autocomplete="off">
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" placeholder="Введите пароль">
                </div>
                
                <div class="form-error" id="loginError" style="display: none;"></div>
                
                <button class="login-btn" id="loginBtn">
                    <span>Войти</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>
            
            <div class="login-footer">
                <p>Демо: admin / admin123</p>
            </div>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script>
        // Проверяем, есть ли уже токен
        const token = localStorage.getItem('token');
        if (token) {
            window.location.href = 'index.html';
        }
        
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const login = document.getElementById('login').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorEl = document.getElementById('loginError');
            
            if (!login || !password) {
                errorEl.textContent = 'Введите логин и пароль';
                errorEl.style.display = 'block';
                return;
            }
            
            try {
                const response = await api.login(login, password);
                
                if (response.success) {
                    localStorage.setItem('token', response.token);
                    localStorage.setItem('user', JSON.stringify(response.user));
                    window.location.href = 'index.html';
                } else {
                    errorEl.textContent = response.message || 'Неверный логин или пароль';
                    errorEl.style.display = 'block';
                }
            } catch (error) {
                errorEl.textContent = 'Ошибка подключения к серверу';
                errorEl.style.display = 'block';
            }
        });
        
        // Enter для отправки формы
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });
    </script>
</body>
</html>
