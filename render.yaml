services:
  - type: web
    name: railway-management
    runtime: python
    repo: https://github.com/your-username/railway-render
    plan: free
    region: frankfurt
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn app:app
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: DEBUG
        value: False